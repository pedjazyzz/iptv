<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Cinema IPTV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif}
:root{--border:rgba(255,255,255,.12);--muted:#aaaabb;--red:#e50914;--red2:#ff3d49;--gold:#ffd166}
body{min-height:100vh;color:#fff;background:radial-gradient(circle at top left,rgba(229,9,20,.32),transparent 35%),radial-gradient(circle at bottom right,rgba(255,209,102,.12),transparent 35%),linear-gradient(135deg,#07070b,#151522 60%,#09090f);padding:22px}
.container{max-width:1400px;margin:auto}
header{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:20px}
h1{font-size:34px}.muted{color:var(--muted);margin-top:5px}
.badge,.btn{border:1px solid var(--border);border-radius:999px;padding:12px 16px;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;font-weight:900;cursor:pointer;text-decoration:none}
.btn.secondary{background:rgba(255,255,255,.08)}
.player-box{display:none;position:relative;background:#000;border-radius:30px;overflow:hidden;border:1px solid var(--border);box-shadow:0 30px 90px rgba(0,0,0,.65);margin-bottom:20px}
video{width:100%;height:62vh;background:#000;display:block}
.now{position:absolute;left:18px;bottom:18px;padding:14px 16px;border-radius:18px;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(12px)}
.welcome{border:1px solid var(--border);border-radius:30px;min-height:260px;display:grid;place-items:center;text-align:center;padding:30px;margin-bottom:22px;background:linear-gradient(145deg,rgba(255,255,255,.085),rgba(255,255,255,.035));box-shadow:0 25px 70px rgba(0,0,0,.38)}
.welcome h2{font-size:34px;margin:10px 0}
.section-title{display:flex;justify-content:space-between;align-items:center;margin:10px 0 16px;padding:14px 16px;border-radius:20px;background:rgba(255,255,255,.055);border:1px solid var(--border)}
.category-grid,.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}
.category-card,.card{min-height:150px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(145deg,rgba(255,255,255,.09),rgba(255,255,255,.035));color:#fff;cursor:pointer;padding:18px;text-align:left;transition:.24s;position:relative;overflow:hidden}
.category-card:hover,.card:hover,.card.active{transform:translateY(-5px) scale(1.02);background:linear-gradient(145deg,rgba(229,9,20,.95),rgba(255,61,73,.78));box-shadow:0 18px 45px rgba(229,9,20,.28)}
.category-icon{font-size:40px;margin-bottom:12px}.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px}
.number{width:42px;height:42px;border-radius:15px;background:rgba(0,0,0,.25);display:grid;place-items:center;color:var(--gold);font-weight:950}
.star{border:none;border-radius:14px;width:38px;height:38px;background:rgba(255,255,255,.13);color:#fff;font-size:19px;cursor:pointer}
.channel-name{font-size:18px;font-weight:950}.channel-group{color:rgba(255,255,255,.72);font-size:12px;margin-top:5px}
.topbar{display:grid;grid-template-columns:1fr auto auto;gap:12px;margin-bottom:18px}
.search,input,select{width:100%;padding:14px 15px;border-radius:16px;border:1px solid var(--border);outline:none;background:rgba(255,255,255,.08);color:#fff}
select option{color:#111}.content{display:none}.error{color:#ff7777;margin-top:7px}
.info{border:1px solid var(--border);border-radius:22px;background:rgba(255,255,255,.055);padding:16px;margin-top:18px}
@media(max-width:800px){body{padding:12px}header,.topbar{grid-template-columns:1fr;flex-direction:column;align-items:stretch}video{height:42vh}h1{font-size:27px}.grid,.category-grid{grid-template-columns:repeat(auto-fill,minmax(135px,1fr))}.channel-name{font-size:15px}}

.form{display:grid;gap:12px;max-width:760px;margin:auto} textarea{width:100%;min-height:260px;border-radius:18px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;padding:14px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px} @media(max-width:800px){.row{grid-template-columns:1fr}}
.list{display:grid;gap:8px;margin-top:18px} .item{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.06)} .danger{background:rgba(255,70,70,.2)}

<div id="login" class="welcome">
  <div><h2>Admin login</h2><p class="muted">Lozinka: admin123</p><br><input id="pass" type="password" placeholder="Lozinka"><br><br><button class="btn" onclick="login()">Uloguj se</button></div>
</div>

<div id="admin" style="display:none">
  <div class="form">
    <div class="row">
      <input id="name" placeholder="Naziv kanala, npr. MTV Hits">
      <input id="no" type="number" placeholder="Broj kanala, npr. 101">
    </div>
    <div class="row">
      <select id="group">
        <option>🎬 Filmovi i Serije</option><option>🎵 Muzički Kanali</option><option>🌍 Dokumentarni</option><option>⚽ Sportski Kanali</option><option>👶 Dečiji Kanali</option><option>📺 Ex-YU Kanali</option>
      </select>
      <input id="url" placeholder="M3U8 link">
    </div>
    <button class="btn" onclick="addChannel()">Dodaj kanal</button>
    <button class="btn secondary" onclick="downloadJson()">Download channels.json</button>
    <label class="muted">Import postojećeg channels.json fajla:</label>
    <input type="file" accept=".json" onchange="importJson(event)">
    <div class="info"><b>Kako koristiš:</b><p class="muted">Dodaš kanal → Download channels.json → uploaduješ taj fajl na hosting umesto starog.</p></div>
  </div>
  <div id="list" class="list"></div>
</div>
</div>

function login(){ if(document.getElementById("pass").value==="admin123"){document.getElementById("login").style.display="none";document.getElementById("admin").style.display="block";render()} else alert("Pogrešna lozinka") }

function addChannel(){
  const name=document.getElementById("name").value.trim(), group=document.getElementById("group").value, url=document.getElementById("url").value.trim();
  let no=Number(document.getElementById("no").value);
  if(!name||!url) return alert("Unesi naziv i link.");
  if(!url.startsWith("http://")&&!url.startsWith("https://")) return alert("Link mora početi sa http:// ili https://");
  if(!no){const same=channels.filter(c=>c.group===group); no=same.length?Math.max(...same.map(c=>Number(c.no)||0))+1:1}
  channels.push({no,name,group,url});
  channels.sort((a,b)=>a.group.localeCompare(b.group)||a.no-b.no);
  document.getElementById("name").value="";document.getElementById("url").value="";document.getElementById("no").value="";
  render();
}

function del(i){ if(confirm("Obrisati kanal?")){channels.splice(i,1);render()} }

function render(){
  document.getElementById("list").innerHTML=channels.map((c,i)=>`<div class="item"><div><b>${c.no}. ${c.name}</b><p class="muted">${c.group}<br>${c.url}</p></div><button class="btn danger" onclick="del(${i})">Obriši</button></div>`).join("");
}

function downloadJson(){
  const blob=new Blob([JSON.stringify(channels,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="channels.json"; a.click(); URL.revokeObjectURL(a.href);
}

function importJson(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{try{channels=JSON.parse(reader.result);render();alert("JSON učitan.")}catch(err){alert("Neispravan JSON.")}};
  reader.readAsText(file);
}
